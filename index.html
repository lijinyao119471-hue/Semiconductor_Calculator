<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOS器件计算工具</title>
  <style>
    /* ===== 基础重置 ===== */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-text-size-adjust:100%}
    body{
      font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#080e1d;
      color:#e2e8f0;
      min-height:100vh;
      line-height:1.5;
    }
    button{cursor:pointer;border:none;background:none;font-family:inherit}
    input{font-family:inherit;outline:none}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}

    /* ===== 全局布局 ===== */
    #app{min-height:100vh;position:relative}

    /* ===== 动态背景 ===== */
    .page-bg{
      min-height:100vh;
      background:linear-gradient(160deg,#080e1d 0%,#0d1a3a 50%,#080e1d 100%);
      position:relative;
      padding:40px 16px 60px;
    }
    .page-bg::before{
      content:'';
      position:fixed;inset:0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 15%,rgba(59,130,246,.09) 0%,transparent 60%),
        radial-gradient(ellipse 50% 35% at 85% 85%,rgba(139,92,246,.07) 0%,transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%,rgba(16,185,129,.04) 0%,transparent 60%);
      pointer-events:none;z-index:0;
    }
    .page-inner{position:relative;z-index:1;margin:0 auto}

    /* ===== 玻璃卡片 ===== */
    .card{
      background:rgba(255,255,255,.04);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      box-shadow:0 8px 32px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.06);
    }
    .card-hover{transition:transform .28s ease,box-shadow .28s ease,border-color .28s ease,background .28s ease}
    .card-hover:hover{
      transform:translateY(-5px);
      background:rgba(255,255,255,.07);
      border-color:rgba(59,130,246,.35);
      box-shadow:0 20px 50px rgba(0,0,0,.45),0 0 0 1px rgba(59,130,246,.2),inset 0 1px 0 rgba(255,255,255,.1);
    }

    /* ===== 渐变文字 ===== */
    .grad-blue{background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .grad-green{background:linear-gradient(135deg,#34d399,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    /* ===== 标题区 ===== */
    .page-header{text-align:center;margin-bottom:44px}
    .badge-pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:5px 16px;
      background:rgba(59,130,246,.1);
      border:1px solid rgba(59,130,246,.25);
      border-radius:20px;margin-bottom:18px;
    }
    .badge-dot{width:7px;height:7px;border-radius:50%;background:#60a5fa;box-shadow:0 0 8px rgba(96,165,250,.9)}
    .badge-text{font-size:11px;font-weight:600;color:#60a5fa;letter-spacing:.07em;text-transform:uppercase}
    .page-title{font-size:38px;font-weight:700;letter-spacing:-.025em;line-height:1.15;color:#f1f5f9;margin-bottom:10px}
    .page-sub{font-size:14px;color:#4b5f7c;font-weight:400}

    /* ===== 模块卡片网格 ===== */
    .module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;max-width:760px;margin:0 auto}
    .module-card{padding:28px;cursor:pointer;position:relative;overflow:hidden}
    .module-card .glow-bg{
      position:absolute;top:-50px;right:-50px;width:130px;height:130px;
      border-radius:50%;pointer-events:none;
    }
    .module-card .card-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px}
    .icon-box{
      width:50px;height:50px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .icon-box-blue{background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(99,102,241,.18));border:1px solid rgba(59,130,246,.28)}
    .icon-box-green{background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(59,130,246,.18));border:1px solid rgba(16,185,129,.28)}
    .card-title{font-size:17px;font-weight:600;color:#f1f5f9;margin-bottom:3px}
    .card-desc{font-size:12px;color:#64748b}
    .card-arrow{color:#334155;flex-shrink:0;margin-top:4px}
    .feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .feature-item{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#94a3b8}

    /* ===== 顶部导航 ===== */
    .top-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
    .btn-back{
      display:inline-flex;align-items:center;gap:6px;
      padding:8px 14px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:9px;color:#94a3b8;font-size:13px;font-weight:500;
      transition:all .2s ease;
    }
    .btn-back:hover{background:rgba(255,255,255,.08);color:#e2e8f0;border-color:rgba(255,255,255,.15)}
    .nav-title-wrap{text-align:center}
    .nav-title{font-size:21px;font-weight:700;color:#f1f5f9;letter-spacing:-.01em;margin-bottom:2px}
    .nav-sub{font-size:11px;color:#475569}

    /* ===== 模式切换 ===== */
    .mode-wrap{display:flex;justify-content:center;margin-bottom:22px}
    .mode-switcher{
      display:inline-flex;
      background:rgba(15,23,42,.7);
      border:1px solid rgba(255,255,255,.07);
      border-radius:12px;padding:4px;gap:3px;
    }
    .mode-btn{
      padding:8px 22px;border-radius:9px;font-size:13px;font-weight:500;
      color:#4b5f7c;background:transparent;transition:all .2s ease;
    }
    .mode-btn.active{
      background:linear-gradient(135deg,#3b82f6,#6366f1);
      color:#fff;
      box-shadow:0 2px 10px rgba(59,130,246,.4);
    }

    /* ===== 表单元素 ===== */
    .lbl{display:block;font-size:11px;font-weight:600;color:#64748b;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
    .inp{
      width:100%;padding:10px 13px;
      background:rgba(10,17,32,.65);
      border:1px solid rgba(255,255,255,.09);
      border-radius:10px;color:#e2e8f0;font-size:14px;
      transition:border-color .2s ease,box-shadow .2s ease;
    }
    .inp:focus{border-color:rgba(59,130,246,.55);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
    .inp::placeholder{color:#334155}

    /* ===== 打线类型按钮 ===== */
    .wire-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .wire-btn{
      padding:9px 4px;border-radius:9px;font-size:12.5px;font-weight:500;text-align:center;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(10,17,32,.4);color:#4b5f7c;
      transition:all .2s ease;
    }
    .wire-btn:hover{border-color:rgba(59,130,246,.4);color:#93c5fd;background:rgba(59,130,246,.08)}
    .wire-btn.w-copper{border-color:rgba(251,191,36,.55);background:rgba(251,191,36,.09);color:#fbbf24;box-shadow:0 0 10px rgba(251,191,36,.15)}
    .wire-btn.w-aluminum{border-color:rgba(148,163,184,.5);background:rgba(148,163,184,.09);color:#94a3b8;box-shadow:0 0 10px rgba(148,163,184,.12)}
    .wire-btn.w-gold{border-color:rgba(251,146,60,.55);background:rgba(251,146,60,.09);color:#fb923c;box-shadow:0 0 10px rgba(251,146,60,.15)}
    .wire-btn.w-aluminumStrip{border-color:rgba(167,139,250,.55);background:rgba(167,139,250,.09);color:#a78bfa;box-shadow:0 0 10px rgba(167,139,250,.15)}

    /* ===== 下拉框 ===== */
    .dd-wrap{position:relative}
    .dd-menu{
      position:absolute;z-index:200;width:100%;margin-top:6px;
      background:#0c1526;border:1px solid rgba(255,255,255,.1);border-radius:12px;
      box-shadow:0 24px 56px rgba(0,0,0,.6);overflow:hidden;display:none;
    }
    .dd-search{padding:10px;border-bottom:1px solid rgba(255,255,255,.06)}
    .dd-list{max-height:210px;overflow-y:auto}
    .dd-list::-webkit-scrollbar{width:4px}
    .dd-list::-webkit-scrollbar-track{background:transparent}
    .dd-list::-webkit-scrollbar-thumb{background:#1e3355;border-radius:4px}
    .dd-item{padding:9px 14px;font-size:13px;color:#94a3b8;cursor:pointer;transition:all .15s}
    .dd-item:hover{background:rgba(59,130,246,.1);color:#93c5fd}

    /* ===== 主按钮 ===== */
    .btn-calc-blue{
      width:100%;padding:12px 24px;
      background:linear-gradient(135deg,#3b82f6,#6366f1);
      border-radius:11px;color:#fff;font-size:14px;font-weight:600;
      box-shadow:0 4px 14px rgba(59,130,246,.38);letter-spacing:.02em;
      transition:all .25s ease;
    }
    .btn-calc-blue:hover{background:linear-gradient(135deg,#2563eb,#4f46e5);box-shadow:0 6px 22px rgba(59,130,246,.55);transform:translateY(-1px)}
    .btn-calc-purple{
      width:100%;padding:12px 24px;
      background:linear-gradient(135deg,#8b5cf6,#6366f1);
      border-radius:11px;color:#fff;font-size:14px;font-weight:600;
      box-shadow:0 4px 14px rgba(139,92,246,.38);letter-spacing:.02em;
      transition:all .25s ease;
    }
    .btn-calc-purple:hover{background:linear-gradient(135deg,#7c3aed,#4f46e5);box-shadow:0 6px 22px rgba(139,92,246,.55);transform:translateY(-1px)}
    .btn-calc-green{
      width:100%;padding:12px 24px;
      background:linear-gradient(135deg,#10b981,#3b82f6);
      border-radius:11px;color:#fff;font-size:14px;font-weight:600;
      box-shadow:0 4px 14px rgba(16,185,129,.35);letter-spacing:.02em;
      transition:all .25s ease;
    }
    .btn-calc-green:hover{box-shadow:0 6px 22px rgba(16,185,129,.5);transform:translateY(-1px)}

    /* ===== 方案标签 ===== */
    .scheme-tag{
      width:28px;height:28px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;flex-shrink:0;
    }
    .scheme-tag-blue{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#60a5fa}
    .scheme-tag-purple{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25);color:#c084fc}

    /* ===== 结果卡片 ===== */
    .res-num-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
    .res-num-box{
      background:rgba(10,17,32,.55);
      border:1px solid rgba(255,255,255,.06);
      border-radius:13px;padding:16px;text-align:center;
    }
    .res-num-box.blue-glow{border-color:rgba(59,130,246,.2);background:rgba(59,130,246,.06)}
    .res-num-box.orange-glow{border-color:rgba(251,146,60,.2);background:rgba(251,146,60,.06)}
    .res-num-box.green-glow{border-color:rgba(16,185,129,.2);background:rgba(16,185,129,.06)}
    .res-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;font-weight:500}
    .res-val{font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1.1}
    .res-unit{font-size:11px;font-weight:500;margin-top:3px}

    /* ===== 详情行 ===== */
    .divider{height:1px;background:rgba(255,255,255,.06);margin:16px 0}
    .sec-title{font-size:10.5px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
    .detail-row{
      display:flex;justify-content:space-between;align-items:center;
      padding:7px 11px;border-radius:8px;
      background:rgba(255,255,255,.02);margin-bottom:3px;font-size:13px;
    }
    .dk{color:#4b5f7c}.dv{color:#cbd5e1;font-weight:500}

    /* ===== 公式卡片 ===== */
    .formula-box{
      background:rgba(59,130,246,.05);
      border:1px solid rgba(59,130,246,.14);
      border-radius:12px;padding:16px;text-align:center;margin-bottom:12px;
    }
    .formula-text{font-size:15px;font-weight:600;color:#93c5fd;letter-spacing:.01em}

    /* ===== 对比差异条 ===== */
    .diff-bar{
      background:rgba(10,17,32,.45);border:1px solid rgba(255,255,255,.06);
      border-radius:12px;padding:16px;text-align:center;
    }
    .diff-val{font-size:22px;font-weight:700;color:#e2e8f0;margin-bottom:4px}
    .diff-hint{font-size:12px;color:#4b5f7c}

    /* ===== 胜者徽章 ===== */
    .winner-badge{
      display:inline-flex;align-items:center;gap:4px;
      padding:2px 9px;
      background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.28);
      border-radius:20px;font-size:11px;color:#34d399;font-weight:500;margin-top:7px;
    }

    /* ===== ID 结果展示 ===== */
    .id-result-hero{
      background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(59,130,246,.08));
      border:1px solid rgba(16,185,129,.2);
      border-radius:14px;padding:26px;text-align:center;margin-bottom:18px;
    }
    .id-hero-label{font-size:11px;color:#6ee7b7;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-weight:600}
    .id-hero-val{font-size:36px;font-weight:700;letter-spacing:-.03em;line-height:1.1}
    .id-hero-unit{font-size:13px;color:#64748b;margin-top:6px;font-weight:500}

    /* ===== 计算过程代码块 ===== */
    .code-block{
      background:rgba(10,17,32,.5);border:1px solid rgba(255,255,255,.05);
      border-radius:11px;padding:15px;
      font-family:'Courier New',Courier,monospace;font-size:12px;
      color:#64748b;line-height:1.8;
    }
    .code-var{color:#93c5fd}.code-result{color:#34d399;font-weight:600}

    /* ===== 错误提示 ===== */
    .err-box{
      background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.22);
      border-radius:12px;padding:14px;color:#f87171;font-size:13px;
      display:flex;align-items:center;gap:10px;
    }

    /* ===== 动画 ===== */
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .anim{animation:fadeUp .38s ease both}

    /* ===== 辅助间距 ===== */
    .mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
    .mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
    .hidden{display:none!important}
  </style>
</head>

// ===================== 计算逻辑 =====================
const A=0.0254;

function calcR(pkg,chipX,chipY,wire,count,diam,width,thick){
  const cfg=PKG[pkg];
  if(!cfg) throw new Error('未知的封装类型: '+pkg);
  const isStrip=wire==='aluminumStrip';
  const matKey=isStrip?'aluminum':wire;
  const rho=RHO[matKey];
  let h=0,wlen,fuse=null;
  if(isStrip&&width&&thick){
    const wm=width*A,tm=thick*A;
    h=wm*tm*1e-6;
    wlen=cfg.lr_d+cfg.lr_e*chipY;
    const m=wm*tm,E=Math.sqrt(4*m/Math.PI)/25.4;
    fuse=FK.aluminum*Math.pow(E,1.5)*count;
  } else if(diam){
    const c=diam*A*0.001;
    h=Math.PI*(c/2)*(c/2);
    wlen=cfg.ls_a+cfg.ls_b*chipX+cfg.ls_c*chipY;
    const m=diam/1000;
    const fk=FK[wire];
    if(fk) fuse=fk*Math.pow(m,1.5)*count;
  } else {
    throw new Error('请输入打线参数');
  }
  if(h===0||wlen===0) throw new Error('参数不能为零');
  const I=wlen*0.001;
  const k=rho*I/h;
  return{resistance:k/count,fusingCurrent:fuse,
    details:{material:MNAME[wire],wireCount:count,diameterMils:isStrip?null:diam,
             widthMils:isStrip?width:null,thicknessMils:isStrip?thick:null,
             crossSectionArea:h*1e6,wireLength:wlen,singleWireResistance:k}};
}
function calcId(tj,r25,rjc,tc){
  const dt=tj-tc,rMin=r25*2.2,rMax=r25*2.7;
  return{idMin:Math.sqrt(dt*1000/(rjc*rMax)),idMax:Math.sqrt(dt*1000/(rjc*rMin)),
    details:{tjMax:tj,tc,r25,rjc,rHotMin:rMin,rHotMax:rMax,deltaT:dt}};
}

// ===================== 交互逻辑 =====================
function toggleCompare(v){
  stA.compare=v;stB.compare=v;
  renderResPage();
}

function toggleDd(id){
  const m=document.getElementById('ddMenu'+id);
  if(!m) return;
  const open=m.style.display==='block';
  document.querySelectorAll('.dd-menu').forEach(el=>el.style.display='none');
  m.style.display=open?'none':'block';
  if(!open) setTimeout(()=>{ const s=document.getElementById('ddSearch'+id); if(s) s.focus(); },40);
}

function filterDd(id,val){
  const list=document.getElementById('ddList'+id);
  if(!list) return;
  const f=val.toLowerCase();
  list.querySelectorAll('.dd-item').forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(f)?'':'none';
  });
}

function pickPkg(id,pkg){
  const st=id==='A'?stA:stB;
  st.pkg=pkg;
  const inp=document.getElementById('pkgInp'+id);
  if(inp) inp.value=pkg;
  const m=document.getElementById('ddMenu'+id);
  if(m) m.style.display='none';
}

function upSt(id,key,val){
  const st=id==='A'?stA:stB;
  st[key]=val;
}

function setWire(id,type){
  const st=id==='A'?stA:stB;
  st.wire=type;
  const dSec=document.getElementById('diamSec'+id);
  const sSec=document.getElementById('stripSec'+id);
  if(type==='aluminumStrip'){
    if(dSec) dSec.classList.add('hidden');
    if(sSec) sSec.classList.remove('hidden');
  } else {
    if(dSec) dSec.classList.remove('hidden');
    if(sSec) sSec.classList.add('hidden');
  }
  const parent=document.querySelector(`button[onclick="setWire('${id}','copper')"]`)?.closest('.card');
  if(parent){
    parent.querySelectorAll('.wire-btn').forEach(btn=>{
      const k=btn.getAttribute('onclick').match(/'([^']+)'\)$/)[1];
      btn.className='wire-btn'+(k===type?' w-'+k:'');
    });
  }
}

function doCalcR(id){
  const st=id==='A'?stA:stB;
  try{
    const chipX=parseFloat(st.chipX)||0;
    const chipY=parseFloat(st.chipY)||0;
    const count=parseInt(st.count)||1;
    const diam=st.wire!=='aluminumStrip'?parseFloat(st.diam)||0:null;
    const sw=st.wire==='aluminumStrip'?parseFloat(st.w)||0:null;
    const sh=st.wire==='aluminumStrip'?parseFloat(st.t)||0:null;
    const res=calcR(st.pkg,chipX,chipY,st.wire,count,diam,sw,sh);
    const area=document.getElementById('resArea');
    if(!area) return;
    if(st.compare){
      const other=id==='A'?stB:stA;
      const ox=parseFloat(other.chipX)||0,oy=parseFloat(other.chipY)||0;
      const oc=parseInt(other.count)||1;
      const od=other.wire!=='aluminumStrip'?parseFloat(other.diam)||0:null;
      const ow=other.wire==='aluminumStrip'?parseFloat(other.w)||0:null;
      const ot=other.wire==='aluminumStrip'?parseFloat(other.t)||0:null;
      const resO=calcR(other.pkg,ox,oy,other.wire,oc,od,ow,ot);
      area.innerHTML=id==='A'?showCompare(res,resO):showCompare(resO,res);
    } else {
      area.innerHTML=showSingle(res);
    }
  } catch(e){
    const area=document.getElementById('resArea');
    if(area) area.innerHTML=`<div class="err-box anim">${ico.warn} 计算错误：${e.message}</div>`;
  }
}

function doCalcId(){
  try{
    const tj=parseFloat(stId.tjMax)||0,tc=parseFloat(stId.tc)||0;
    const r25=parseFloat(stId.r25)||0,rjc=parseFloat(stId.rjc)||0;
    if(tj<=tc) throw new Error('最大结温必须大于外壳温度');
    if(r25<=0||rjc<=0) throw new Error('电阻和热阻必须大于 0');
    const res=calcId(tj,r25,rjc,tc);
    const area=document.getElementById('idRes');
    if(area) area.innerHTML=showId(res);
  } catch(e){
    const area=document.getElementById('idRes');
    if(area) area.innerHTML=`<div class="err-box anim">${ico.warn} 计算错误：${e.message}</div>`;
  }
}

function showCompare(rA,rB){
  const diff=(rA.resistance-rB.resistance)*1e3;
  const pct=(Math.abs(diff)/Math.min(rA.resistance*1e3,rB.resistance*1e3)*100).toFixed(1);
  const better=rA.resistance<rB.resistance?'A':'B';
  return `
  <div class="card anim" style="padding:24px">
    <div class="sec-title">对比结果</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div class="res-num-box" style="border-color:${better==='A'?'rgba(59,130,246,.4)':'rgba(255,255,255,.06)'};background:${better==='A'?'rgba(59,130,246,.07)':'rgba(10,17,32,.55)'}">
        <div style="font-size:10px;color:#60a5fa;font-weight:700;letter-spacing:.06em;margin-bottom:8px">方案 A</div>
        <div style="font-size:25px;font-weight:700;color:${better==='A'?'#60a5fa':'#64748b'};letter-spacing:-.02em">${(rA.resistance*1e3).toFixed(3)}</div>
        <div style="font-size:10px;color:#3b82f6;margin-top:3px;font-weight:500">mΩ</div>
        ${rA.fusingCurrent?`<div style="font-size:11px;color:#f97316;margin-top:5px">极限电流 ${rA.fusingCurrent.toFixed(2)} A</div>`:''}
        ${better==='A'?'<div><span class="winner-badge">✓ 更低阻值</span></div>':''}
      </div>
      <div class="res-num-box" style="border-color:${better==='B'?'rgba(192,132,252,.4)':'rgba(255,255,255,.06)'};background:${better==='B'?'rgba(139,92,246,.07)':'rgba(10,17,32,.55)'}">
        <div style="font-size:10px;color:#c084fc;font-weight:700;letter-spacing:.06em;margin-bottom:8px">方案 B</div>
        <div style="font-size:25px;font-weight:700;color:${better==='B'?'#c084fc':'#64748b'};letter-spacing:-.02em">${(rB.resistance*1e3).toFixed(3)}</div>
        <div style="font-size:10px;color:#a855f7;margin-top:3px;font-weight:500">mΩ</div>
        ${rB.fusingCurrent?`<div style="font-size:11px;color:#f97316;margin-top:5px">极限电流 ${rB.fusingCurrent.toFixed(2)} A</div>`:''}
        ${better==='B'?'<div><span class="winner-badge">✓ 更低阻值</span></div>':''}
      </div>
    </div>
    <div class="diff-bar">
      <div style="font-size:10px;color:#334155;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:600">电阻差异</div>
      <div class="diff-val">${Math.abs(diff).toFixed(3)} mΩ</div>
      <div class="diff-hint">${pct}% · 方案 ${better} 阻值更低</div>
    </div>
  </div>`;
}

function showId(r){
  const d=r.details;
  return `
  <div class="card anim" style="padding:24px">
    <div class="sec-title">计算结果</div>
    <div class="id-result-hero">
      <div class="id-hero-label">器件 ID 范围</div>
      <div class="id-hero-val grad-green">${r.idMin.toFixed(2)} ~ ${r.idMax.toFixed(2)}</div>
      <div class="id-hero-unit">Ampere (A)</div>
    </div>
    <div class="divider"></div>
    <div class="sec-title">计算过程</div>
    <div class="code-block">
      <div>ΔT &nbsp;&nbsp;&nbsp;&nbsp;= TjMax − Tc = <span class="code-var">${d.deltaT} °C</span></div>
      <div>Rhot_min = R25 × 2.2 = <span class="code-var">${d.rHotMin.toFixed(2)} mΩ</span></div>
      <div>Rhot_max = R25 × 2.7 = <span class="code-var">${d.rHotMax.toFixed(2)} mΩ</span></div>
      <div style="height:1px;background:rgba(255,255,255,.05);margin:6px 0"></div>
      <div>ID_max = √(${d.deltaT}×1000 / (${d.rjc}×${d.rHotMin.toFixed(2)})) = <span class="code-result">${r.idMax.toFixed(2)} A</span></div>
      <div>ID_min = √(${d.deltaT}×1000 / (${d.rjc}×${d.rHotMax.toFixed(2)})) = <span class="code-result">${r.idMin.toFixed(2)} A</span></div>
    </div>
  </div>`;
}

document.addEventListener('click',function(e){
  if(!e.target.closest('.dd-wrap')){
    document.querySelectorAll('.dd-menu').forEach(el=>el.style.display='none');
  }
});
