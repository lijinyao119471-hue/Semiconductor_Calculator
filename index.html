// ===================== 计算逻辑 =====================
const A=0.0254;

function calcR(pkg,chipX,chipY,wire,count,diam,width,thick){
  const cfg=PKG[pkg];
  if(!cfg) throw new Error('未知的封装类型: '+pkg);
  const isStrip=wire==='aluminumStrip';
  const matKey=isStrip?'aluminum':wire;
  const rho=RHO[matKey];
  let h=0,wlen,fuse=null;
  if(isStrip&&width&&thick){
    const wm=width*A,tm=thick*A;
    h=wm*tm*1e-6;
    wlen=cfg.lr_d+cfg.lr_e*chipY;
    const m=wm*tm,E=Math.sqrt(4*m/Math.PI)/25.4;
    fuse=FK.aluminum*Math.pow(E,1.5)*count;
  } else if(diam){
    const c=diam*A*0.001;
    h=Math.PI*(c/2)*(c/2);
    wlen=cfg.ls_a+cfg.ls_b*chipX+cfg.ls_c*chipY;
    const m=diam/1000;
    const fk=FK[wire];
    if(fk) fuse=fk*Math.pow(m,1.5)*count;
  } else {
    throw new Error('请输入打线参数');
  }
  if(h===0||wlen===0) throw new Error('参数不能为零');
  const I=wlen*0.001;
  const k=rho*I/h;
  return{resistance:k/count,fusingCurrent:fuse,
    details:{material:MNAME[wire],wireCount:count,diameterMils:isStrip?null:diam,
             widthMils:isStrip?width:null,thicknessMils:isStrip?thick:null,
             crossSectionArea:h*1e6,wireLength:wlen,singleWireResistance:k}};
}
function calcId(tj,r25,rjc,tc){
  const dt=tj-tc,rMin=r25*2.2,rMax=r25*2.7;
  return{idMin:Math.sqrt(dt*1000/(rjc*rMax)),idMax:Math.sqrt(dt*1000/(rjc*rMin)),
    details:{tjMax:tj,tc,r25,rjc,rHotMin:rMin,rHotMax:rMax,deltaT:dt}};
}

// ===================== 交互逻辑 =====================
function toggleCompare(v){
  stA.compare=v;stB.compare=v;
  renderResPage();
}

function toggleDd(id){
  const m=document.getElementById('ddMenu'+id);
  if(!m) return;
  const open=m.style.display==='block';
  document.querySelectorAll('.dd-menu').forEach(el=>el.style.display='none');
  m.style.display=open?'none':'block';
  if(!open) setTimeout(()=>{ const s=document.getElementById('ddSearch'+id); if(s) s.focus(); },40);
}

function filterDd(id,val){
  const list=document.getElementById('ddList'+id);
  if(!list) return;
  const f=val.toLowerCase();
  list.querySelectorAll('.dd-item').forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(f)?'':'none';
  });
}

function pickPkg(id,pkg){
  const st=id==='A'?stA:stB;
  st.pkg=pkg;
  const inp=document.getElementById('pkgInp'+id);
  if(inp) inp.value=pkg;
  const m=document.getElementById('ddMenu'+id);
  if(m) m.style.display='none';
}

function upSt(id,key,val){
  const st=id==='A'?stA:stB;
  st[key]=val;
}

function setWire(id,type){
  const st=id==='A'?stA:stB;
  st.wire=type;
  const dSec=document.getElementById('diamSec'+id);
  const sSec=document.getElementById('stripSec'+id);
  if(type==='aluminumStrip'){
    if(dSec) dSec.classList.add('hidden');
    if(sSec) sSec.classList.remove('hidden');
  } else {
    if(dSec) dSec.classList.remove('hidden');
    if(sSec) sSec.classList.add('hidden');
  }
  const parent=document.querySelector(`button[onclick="setWire('${id}','copper')"]`)?.closest('.card');
  if(parent){
    parent.querySelectorAll('.wire-btn').forEach(btn=>{
      const k=btn.getAttribute('onclick').match(/'([^']+)'\)$/)[1];
      btn.className='wire-btn'+(k===type?' w-'+k:'');
    });
  }
}

function doCalcR(id){
  const st=id==='A'?stA:stB;
  try{
    const chipX=parseFloat(st.chipX)||0;
    const chipY=parseFloat(st.chipY)||0;
    const count=parseInt(st.count)||1;
    const diam=st.wire!=='aluminumStrip'?parseFloat(st.diam)||0:null;
    const sw=st.wire==='aluminumStrip'?parseFloat(st.w)||0:null;
    const sh=st.wire==='aluminumStrip'?parseFloat(st.t)||0:null;
    const res=calcR(st.pkg,chipX,chipY,st.wire,count,diam,sw,sh);
    const area=document.getElementById('resArea');
    if(!area) return;
    if(st.compare){
      const other=id==='A'?stB:stA;
      const ox=parseFloat(other.chipX)||0,oy=parseFloat(other.chipY)||0;
      const oc=parseInt(other.count)||1;
      const od=other.wire!=='aluminumStrip'?parseFloat(other.diam)||0:null;
      const ow=other.wire==='aluminumStrip'?parseFloat(other.w)||0:null;
      const ot=other.wire==='aluminumStrip'?parseFloat(other.t)||0:null;
      const resO=calcR(other.pkg,ox,oy,other.wire,oc,od,ow,ot);
      area.innerHTML=id==='A'?showCompare(res,resO):showCompare(resO,res);
    } else {
      area.innerHTML=showSingle(res);
    }
  } catch(e){
    const area=document.getElementById('resArea');
    if(area) area.innerHTML=`<div class="err-box anim">${ico.warn} ${e.message}</div>`;
  }
}

function setIdMode(m){
  stId.idMode = m;
  goId();
}

function copyRonA2B(){
  ['pkg','chipX','chipY','wire','count','diam','w','t'].forEach(k=> stB[k]=stA[k]);
  renderCalcArea();
}

function doCalcRjc(){
  try{
    const id=parseFloat(stId.idCurrent)||0;
    const tj=parseFloat(stId.tjMax)||0,tc=parseFloat(stId.tc)||0;
    const r25=parseFloat(stId.r25)||0;
    if(id<=0) throw new Error('ID > 0');
    if(tj<=tc) throw new Error('TjMax > Tc');
    if(r25<=0) throw new Error('R25 > 0');
    const dt=tj-tc;
    const rMin=r25*2.2,rMax=r25*2.7;
    // RJC = ΔT × 1000 / (ID² × Rhot)
    const rjcMin=dt*1000/(id*id*rMax);
    const rjcMax=dt*1000/(id*id*rMin);
    const area=document.getElementById('idRes');
    if(area) area.innerHTML=`
    <div class="card anim" style="padding:24px">
      <div class="sec-title">${L('result')}</div>
      <div class="id-result-hero">
        <div class="id-hero-label">${L('rjc_range')}</div>
        <div class="id-hero-val grad-blue">${rjcMin.toFixed(3)} ~ ${rjcMax.toFixed(3)}</div>
        <div class="id-hero-unit">°C/W</div>
      </div>
      <div class="divider"></div>
      <div class="sec-title">${L('calc_proc')}</div>

// ===================== 硅材料电阻率计算模块 =====================

// Caughey-Thomas 迁移率模型参数（用户指定 μmax）
const MOBILITY_PARAMS = {
  'n-phosphorus':  { mumax:1360, mumin:60,   Nref:9.68e16, alpha:0.711 },
  'n-arsenic':     { mumax:1360, mumin:60,   Nref:9.68e16, alpha:0.711 },
  'n-antimony':    { mumax:1280, mumin:60,   Nref:1.98e17, alpha:0.719 },
  'p-boron':       { mumax:462,  mumin:44.9, Nref:2.23e17, alpha:0.719 }
};

function calcMobility(N_cm3, dopantType) {
  const p = MOBILITY_PARAMS[dopantType];
  if (!p) return 0;
  return p.mumin + (p.mumax - p.mumin) / (1 + Math.pow(N_cm3 / p.Nref, p.alpha));
}

// 温度修正迁移率：μ(T) = μ(300K) × (300/T)^γ
function calcMobilityTemp(N_cm3, dopantType, T) {
  const mu_300 = calcMobility(N_cm3, dopantType);
  const gamma = dopantType.startsWith('n') ? 2.42 : 2.20;
  return mu_300 * Math.pow(T / 300, -gamma);
}

function calcResistivity(dopantType, N_cm3, T) {
  T = T || 300;
  const q = 1.602176634e-19;
  const isNType = dopantType.startsWith('n');
  const mu = calcMobilityTemp(N_cm3, dopantType, T); // cm²/V·s
  const sigma_S_per_cm = q * mu * N_cm3;               // S/cm
  const rho_ohm_cm = 1 / sigma_S_per_cm;               // Ω·cm
  const sigma_S_per_m = sigma_S_per_cm * 100;            // S/m
  const rho_ohm_m = 1 / sigma_S_per_m;                 // Ω·m
  return {
    rho_ohm_cm,
    rho_ohm_m,
    sigma_S_per_cm,
    sigma_S_per_m,
    mobility_cm2_per_Vs: mu,
    carrier_conc: N_cm3
  };
}

function doCalcConcentration() {
  try {
    let rhoInput = parseFloat(stResistivity.rhoInput);
    if (isNaN(rhoInput) || rhoInput <= 0) throw new Error(L('err_rho'));

    // 转换为 Ω·cm
    let rho_ohm_cm = stResistivity.rhoInputUnit === 'ohm_m' ? rhoInput / 100 : rhoInput;

    const T = parseFloat(stResistivity.temperature) || 300;
    if (T < 200 || T > 500) throw new Error(L('err_temp'));

    const dopantType = stResistivity.dopantType;
    const q = 1.602176634e-19;
    const isNType = dopantType.startsWith('n');

    // 用二分法反算掺杂浓度 N from ρ = 1/(q·μ(N,T)·N)
    // ρ·q·μ(N,T)·N = 1 → 需要数值求解
    let Nlow = 1e12, Nhigh = 1e21;
    for (let iter = 0; iter < 200; iter++) {
      let Nmid = Math.sqrt(Nlow * Nhigh);
      let mu = calcMobilityTemp(Nmid, dopantType, T);
      let rhoCalc = 1 / (q * mu * Nmid);
      if (rhoCalc > rho_ohm_cm) {
        Nhigh = Nmid;
      } else {
        Nlow = Nmid;
      }
    }
    const N_cm3 = Math.sqrt(Nlow * Nhigh);

    if (N_cm3 < 1e12 || N_cm3 > 1e21) throw new Error(L('err_rho_range'));

    const result = calcResistivity(dopantType, N_cm3, T);
    const mobLabel = isNType ? L('mu_n') : L('mu_p');
    const carrierLabel = isNType ? L('carrier_n') : L('carrier_p');

    // 电阻率单位显示
    const rhoU = stResistivity.resistivityUnit;
    const rhoVal = rhoU === 'ohm_m' ? result.rho_ohm_m : result.rho_ohm_cm;
    const rhoUnitStr = rhoU === 'ohm_m' ? 'Ω·m' : 'Ω·cm';

    let sheetHtml = '';
    const thickVal = parseFloat(stResistivity.thickness);
    if (thickVal > 0) {
      let t_cm;
      const tu = stResistivity.thicknessUnit;
      if (tu === 'um') t_cm = thickVal * 1e-4;
      else if (tu === 'mm') t_cm = thickVal * 0.1;
      else t_cm = thickVal * 2.54e-4;
      const Rs = result.rho_ohm_cm / t_cm;
      sheetHtml = `
        <div class="res-box orange-border" style="margin-top:12px">
          <div class="res-label">${L('sheet_r')}</div>
          <div class="res-value" style="color:#fb923c">${Rs.toExponential(3)}</div>
          <div class="res-unit">Ω/sq</div>
        </div>`;
    }

    document.getElementById('resistivityResult').innerHTML = `
      <div class="card anim" style="padding:22px">
        <div class="sec-title">${L('result')}</div>
        <div class="res-box green-border" style="margin-bottom:12px">
          <div class="res-label">${L('conc')}</div>
          <div class="res-value" style="color:#6ee7b7;font-size:22px">${N_cm3.toExponential(3)}</div>
          <div style="font-size:13px;color:#6ee7b7;font-weight:500">cm⁻³</div>
        </div>
        <div class="res-grid">
          <div class="res-box" style="border-color:rgba(255,255,255,.06)">
            <div class="res-label">${L('rho')}</div>
            <div class="res-value" style="color:#e2e8f0;font-size:20px">${rhoVal.toExponential(3)}</div>
            <div class="rho-unit-toggle">
              <button class="rho-unit-btn ${rhoU==='ohm_cm'?'active':''}" onclick="switchRhoUnitRev('ohm_cm')">Ω·cm</button>
              <button class="rho-unit-btn ${rhoU==='ohm_m'?'active':''}" onclick="switchRhoUnitRev('ohm_m')">Ω·m</button>
            </div>
          </div>
          <div class="res-box" style="border-color:rgba(255,255,255,.06)">
            <div class="res-label">${mobLabel}</div>
            <div class="res-value" style="color:#e2e8f0;font-size:20px">${result.mobility_cm2_per_Vs.toFixed(1)}</div>
            <div class="res-unit">cm²/V·s</div>
          </div>
        </div>
        <div style="height:1px;background:rgba(255,255,255,.06);margin:14px 0"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <div style="font-size:11px;color:#64748b;margin-bottom:4px">${L('sigma')}</div>
            <div style="font-size:16px;font-weight:600;color:#cbd5e1">${result.sigma_S_per_cm.toExponential(3)} S/cm</div>
          </div>
          <div>
            <div style="font-size:11px;color:#64748b;margin-bottom:4px">${L('temp')}</div>
            <div style="font-size:16px;font-weight:600;color:#cbd5e1">${T} K</div>
          </div>
        </div>
        ${sheetHtml}
      </div>`;

    stResistivity.concentration = N_cm3.toExponential(3);
    renderCharts(dopantType);
  } catch(e) {
    document.getElementById('resistivityResult').innerHTML = `
      <div class="err-box anim">${ico.warn} ${e.message}</div>`;
  }
}

function doCalcResistivity() {
  try {
    let N = parseFloat(stResistivity.concentration);

    let sheetHtml = '';
    const thickVal = parseFloat(stResistivity.thickness);

      sheetHtml = `

    document.getElementById('resistivityResult').innerHTML = `

// Core calculation function - returns result object
function calcWaferCore(D, dieXmm, dieYmm, S, E, Y){
  const Deff = D - 2 * E;
  if(Deff <= 0) return null;
  const Xeff = dieXmm + S;
  const Yeff = dieYmm + S;
  const R = Deff / 2;
  const cols = Math.ceil(Deff / Xeff);
  const rows = Math.ceil(Deff / Yeff);
  let grossDie = 0;
  const diePositions = [];
  const startX = -(cols * Xeff) / 2;
  const startY = -(rows * Yeff) / 2;
  for(let r = 0; r < rows; r++){
    for(let c = 0; c < cols; c++){
      const cx = startX + c * Xeff + Xeff / 2;
      const cy = startY + r * Yeff + Yeff / 2;
      const inside = (cx * cx + cy * cy) <= (R * R);
      if(inside) grossDie++;
      const inWafer = Math.sqrt(cx * cx + cy * cy) <= (D / 2);
      if(inWafer) diePositions.push({cx, cy, inside});
    }
  }
  const netDie = Math.round(grossDie * Y / 100);
  const dieArea = dieXmm * dieYmm;
  const waferArea = Math.PI * R * R;
  const utilization = (grossDie * dieArea / waferArea) * 100;
  return {Deff, grossDie, netDie, utilization, diePositions, dieXmm, dieYmm};
}

function doCalcWafer(){
  const du = stWafer.dieUnit || 'mm';
  const isCompare = stWafer.waferMode === 'compare';

  // Set A params
  const DA = WAFER_DIAMETERS[stWafer.waferSize] || 150;
  let dieX = parseFloat(stWafer.dieX) || 0;
  let dieY = parseFloat(stWafer.dieY) || 0;
  if(du === 'um'){ dieX /= 1000; dieY /= 1000; }

  const EA = parseFloat(stWafer.edgeExclusion) || 0;
  let YA = parseFloat(stWafer.yieldPct);
  if(isNaN(YA) || YA < 0) YA = 0;
  if(YA > 100) YA = 100;

  if(dieX <= 0 || dieY <= 0){
    document.getElementById('waferResult').innerHTML=`<div class="err-box">${ico.warn} ${L('w_err_die')}</div>`;
    return;

    document.getElementById('waferResult').innerHTML=`<div class="err-box">${ico.warn} ${L('w_err_saw')}</div>`;
    return;
  }

  const resA = calcWaferCore(DA, dieX, dieY, SA, EA, YA);

    document.getElementById('waferResult').innerHTML=`<div class="err-box">Edge exclusion too large</div>`;
    return;
  }

  let DB = DA, SB = SA, EB = EA, YB = YA;

    DB = WAFER_DIAMETERS[stWafer.waferSize2] || 150;
    let dieX2 = parseFloat(stWafer.dieX2) || 0;
    let dieY2 = parseFloat(stWafer.dieY2) || 0;
    if(du === 'um'){ dieX2 /= 1000; dieY2 /= 1000; }

    EB = parseFloat(stWafer.edgeExclusion2) || 0;
    YB = parseFloat(stWafer.yieldPct2);

    if(YB > 100) YB = 100;
    if(dieX2 > 0 && dieY2 > 0){

    }
  }

    // === COMPARE MODE ===

    const dGross = resB.grossDie - resA.grossDie;
    const dNet = resB.netDie - resA.netDie;
    const dUtil = resB.utilization - resA.utilization;

            <div class="res-val" style="color:#c084fc;font-size:22px">${resA.grossDie.toLocaleString()}</div>
          </div>
          <div class="wafer-result-box green-glow">
            <div class="res-label" style="font-size:11px">${L('w_net')}</div>
            <div class="res-val" style="color:#34d399;font-size:22px">${resA.netDie.toLocaleString()}</div>
          </div>
          <div class="wafer-result-box blue-glow">
            <div class="res-label" style="font-size:11px">${L('w_util')}</div>
            <div class="res-val" style="color:#60a5fa;font-size:22px">${resA.utilization.toFixed(1)}%</div>
          </div>
        </div>
        <div style="margin-top:10px;font-size:11px;color:#94a3b8">
          <div class="detail-row"><span class="dk">${L('w_diam')}</span><span class="dv">${DA} mm</span></div>
          <div class="detail-row"><span class="dk">${L('w_eff_diam')}</span><span class="dv">${resA.Deff.toFixed(1)} mm</span></div>
          <div class="detail-row"><span class="dk">${L('w_die_size')}</span><span class="dv">${resA.dieXmm.toFixed(2)} × ${resA.dieYmm.toFixed(2)} mm</span></div>
          <div class="detail-row"><span class="dk">${L('w_saw_w')}</span><span class="dv">${SA} mm</span></div>
          <div class="detail-row"><span class="dk">${L('w_yield')}</span><span class="dv">${YA} %</span></div>
        </div>
      </div>
      <!-- Set B Result Card -->
      <div class="card" style="padding:18px;background:linear-gradient(135deg,rgba(59,130,246,.06),rgba(30,30,46,.85));border:1px solid rgba(59,130,246,.18)">
        <div style="text-align:center;margin-bottom:12px">
          <span style="font-size:14px;font-weight:700;color:#60a5fa;letter-spacing:1px">${L('w_set_b')}</span>
          <span style="font-size:11px;color:#94a3b8;margin-left:6px">${resB.dieXmm.toFixed(2)} × ${resB.dieYmm.toFixed(2)} mm</span>
        </div>
        <div class="wafer-result-grid" style="grid-template-columns:1fr 1fr 1fr;gap:8px">
          <div class="wafer-result-box purple-glow">
            <div class="res-label" style="font-size:11px">${L('w_gross')}</div>
            <div class="res-val" style="color:#c084fc;font-size:22px">${resB.grossDie.toLocaleString()}</div>
          </div>
          <div class="wafer-result-box green-glow">
            <div class="res-label" style="font-size:11px">${L('w_net')}</div>
            <div class="res-val" style="color:#34d399;font-size:22px">${resB.netDie.toLocaleString()}</div>
          </div>
          <div class="wafer-result-box blue-glow">
            <div class="res-label" style="font-size:11px">${L('w_util')}</div>
            <div class="res-val" style="color:#60a5fa;font-size:22px">${resB.utilization.toFixed(1)}%</div>
          </div>
        </div>
        <div style="margin-top:10px;font-size:11px;color:#94a3b8">
          <div class="detail-row"><span class="dk">${L('w_diam')}</span><span class="dv">${DB} mm</span></div>
          <div class="detail-row"><span class="dk">${L('w_eff_diam')}</span><span class="dv">${resB.Deff.toFixed(1)} mm</span></div>
          <div class="detail-row"><span class="dk">${L('w_die_size')}</span><span class="dv">${resB.dieXmm.toFixed(2)} × ${resB.dieYmm.toFixed(2)} mm</span></div>
          <div class="detail-row"><span class="dk">${L('w_saw_w')}</span><span class="dv">${SB} mm</span></div>
          <div class="detail-row"><span class="dk">${L('w_yield')}</span><span class="dv">${YB} %</span></div>
        </div>
      </div>
    </div>
    <!-- Delta row with change rate -->
    <div class="card mb20" style="padding:12px 18px;background:rgba(250,204,21,.04);border:1px solid rgba(250,204,21,.12);border-radius:10px;display:flex;justify-content:space-around;font-size:12px;flex-wrap:wrap;gap:8px">
      <div><span style="color:#64748b">${L('w_gross')} Δ</span> <span style="color:${dGross>=0?'#34d399':'#f87171'};font-weight:600">${dGross>=0?'+':''}${dGross.toLocaleString()}</span> <span style="color:${dGross>=0?'#34d399':'#f87171'};font-size:11px">(${dGross>=0?'+':''}${grossPct.toFixed(1)}%)</span></div>
      <div><span style="color:#64748b">${L('w_net')} Δ</span> <span style="color:${dNet>=0?'#34d399':'#f87171'};font-weight:600">${dNet>=0?'+':''}${dNet.toLocaleString()}</span> <span style="color:${dNet>=0?'#34d399':'#f87171'};font-size:11px">(${dNet>=0?'+':''}${netPct.toFixed(1)}%)</span></div>
      <div><span style="color:#64748b">${L('w_util')} Δ</span> <span style="color:${dUtil>=0?'#34d399':'#f87171'};font-weight:600">${dUtil>=0?'+':''}${dUtil.toFixed(1)}%</span></div>
    </div>`;

    // Dual canvas
    html += `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card" style="padding:16px">
        <div style="text-align:center;font-size:12px;color:#c084fc;margin-bottom:8px">${L('w_set_a')}</div>
        <div class="wafer-canvas-wrap" style="padding:8px">
          <canvas id="waferCanvasA" width="400" height="400"></canvas>
        </div>
      </div>
      <div class="card" style="padding:16px">
        <div style="text-align:center;font-size:12px;color:#60a5fa;margin-bottom:8px">${L('w_set_b')}</div>
        <div class="wafer-canvas-wrap" style="padding:8px">
          <canvas id="waferCanvasB" width="400" height="400"></canvas>
        </div>
      </div>
    </div>
    <div class="wafer-legend" style="margin-top:8px">
      <div class="wafer-legend-item"><div class="wafer-legend-dot" style="background:rgba(139,92,246,.5)"></div>${L('w_legend_in')}</div>
      <div class="wafer-legend-item"><div class="wafer-legend-dot" style="background:rgba(100,116,139,.2)"></div>${L('w_legend_out')}</div>
    </div>`;

    document.getElementById('waferResult').innerHTML = html;
    drawWafer('waferCanvasA', DA, resA.Deff, resA.dieXmm, resA.dieYmm, SA, resA.diePositions);
    drawWafer('waferCanvasB', DB, resB.Deff, resB.dieXmm, resB.dieYmm, SB, resB.diePositions);

  } else {
    // === SINGLE MODE ===
    html += `
    <div class="card mb20" style="padding:22px">
      <div class="wafer-result-grid">
        <div class="wafer-result-box purple-glow">
          <div class="res-label">${L('w_gross')}</div>
          <div class="res-val" style="color:#c084fc">${resA.grossDie.toLocaleString()}</div>
        </div>
        <div class="wafer-result-box green-glow">
          <div class="res-label">${L('w_net')}</div>
          <div class="res-val" style="color:#34d399">${resA.netDie.toLocaleString()}</div>
        </div>
        <div class="wafer-result-box blue-glow">
          <div class="res-label">${L('w_util')}</div>
          <div class="res-val" style="color:#60a5fa">${resA.utilization.toFixed(1)}%</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="detail-row"><span class="dk">${L('w_diam')}</span><span class="dv">${DA} mm</span></div>
      <div class="detail-row"><span class="dk">${L('w_eff_diam')}</span><span class="dv">${resA.Deff.toFixed(1)} mm</span></div>
      <div class="detail-row"><span class="dk">${L('w_die_size')}</span><span class="dv">${resA.dieXmm.toFixed(2)} × ${resA.dieYmm.toFixed(2)} mm</span></div>
      <div class="detail-row"><span class="dk">${L('w_saw_w')}</span><span class="dv">${SA} mm</span></div>
      <div class="detail-row"><span class="dk">${L('w_yield')}</span><span class="dv">${YA} %</span></div>
    </div>

    <div class="card mb20" style="padding:22px">
      <div class="wafer-canvas-wrap">
        <canvas id="waferCanvas" width="500" height="500"></canvas>
      </div>
      <div class="wafer-legend">
        <div class="wafer-legend-item"><div class="wafer-legend-dot" style="background:rgba(139,92,246,.5)"></div>${L('w_legend_in')}</div>
        <div class="wafer-legend-item"><div class="wafer-legend-dot" style="background:rgba(100,116,139,.2)"></div>${L('w_legend_out')}</div>
      </div>
    </div>`;

    document.getElementById('waferResult').innerHTML = html;
    drawWafer('waferCanvas', DA, resA.Deff, resA.dieXmm, resA.dieYmm, SA, resA.diePositions);
  }
}

function drawWafer(canvasId, D, Deff, dieX, dieY, S, diePositions){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const cx = W / 2;
  const cy = H / 2;

  // Scale: fit wafer with margin
  const margin = 30;
  const scale = (Math.min(W, H) - 2 * margin) / D;

  ctx.clearRect(0, 0, W, H);

  // Draw full wafer circle (background)
  ctx.beginPath();
  ctx.arc(cx, cy, (D / 2) * scale, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(30,41,59,0.6)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(100,116,139,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Draw edge exclusion ring
  ctx.beginPath();
  ctx.arc(cx, cy, (Deff / 2) * scale, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(168,85,247,0.25)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw dies
  const Xeff = dieX + S;
  const Yeff = dieY + S;
  const dieW = dieX * scale;
  const dieH = dieY * scale;
  const gap = S * scale;

  for(let i = 0; i < diePositions.length; i++){
    const d = diePositions[i];
    const px = cx + d.cx * scale - dieW / 2;
    const py = cy + d.cy * scale - dieH / 2;

    // Skip very tiny dies (performance)
    if(dieW < 0.8) {
      // Draw as pixels for very small dies
      ctx.fillStyle = d.inside ? 'rgba(139,92,246,0.5)' : 'rgba(100,116,139,0.15)';
      ctx.fillRect(Math.round(px), Math.round(py), Math.max(1, Math.round(dieW)), Math.max(1, Math.round(dieH)));
    } else {
      ctx.fillStyle = d.inside ? 'rgba(139,92,246,0.45)' : 'rgba(100,116,139,0.12)';
      ctx.fillRect(px + gap / 2, py + gap / 2, dieW - gap, dieH - gap);

      if(d.inside && dieW > 2){
        ctx.strokeStyle = 'rgba(139,92,246,0.25)';
        ctx.lineWidth = 0.3;
        ctx.strokeRect(px + gap / 2, py + gap / 2, dieW - gap, dieH - gap);
      }
    }
  }

  // Re-draw effective circle on top for clarity
  ctx.beginPath();
  ctx.arc(cx, cy, (Deff / 2) * scale, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(168,85,247,0.35)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Wafer notch/flat indicator
  const notchY = cy + (D / 2) * scale;
  ctx.beginPath();
  ctx.moveTo(cx - 6, notchY);
  ctx.lineTo(cx + 6, notchY);
  ctx.lineTo(cx, notchY - 4);
  ctx.closePath();
  ctx.fillStyle = 'rgba(100,116,139,0.5)';
  ctx.fill();
}
